<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display:flex;
            justify-content: center;
            align-items: center;
            height:100vh;
            margin: 0;
        }
        .form-container{
            background:white;
            padding:20px;
            border-radius:8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            max-width: 400px;
            width:100%;
        }

        .form-container h2{
            text-align:center;
            margin-bottom:20px;
        }

        .form-group{
            margin-bottom: 15px;
        }

        .form-group label{
            display: block;
            margin-bottom: 5px;
        }

        .form-group input[type="email"],
        .form-group input[type="submit"]{
            width: 100%;
            padding:10px;
            border: 1px solid #ccc;
            border-radius:4px;
        }

        .form-group input[type="submit"]{
            background-color:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        .form-group input[type="submit"]:hover{
            background-color: #0056b3;
        }

        .form-group a{
            text-decoration:none;
            color:#007bff;
            display:block;
            text-align: center;
            margin-top: 10px;
        }

        .form-group a:hover{
            color:#0056b3;
        }

    </style>
</head>
<body>
    <div class="form-container">
        <h2>Recuperar contraseña</h2>
        <form action="enviar_validacion.php" method="POST">
            <div class="form-group">
                <label for="correo"> Correo electrónico</label>
                <input type="email" id="correo" name="correo" placeholder="Introduce tu correo" required>
            </div>
            <div class="form-group">
                <input type="submit" value="Enviar enlace de recuperación">
            </div>
            <div class="form-group">
                <a href="login.html">Volver al inicio de sesión</a>
            </div>
        </form>
    </div>
</body>
</html>
